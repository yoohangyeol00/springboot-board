spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://192.168.220.128:5432/board_db
    username: board_user
    password: board_pass
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

file:
  upload-dir: uploads

jwt:
  secret: ${JWT_SECRET:change-this-secret-key-must-be-at-least-32-bytes-long}
  access-token-expiration: 3600000

mybatis:
  mapper-locations: classpath:/mapper/**/*.xml
  type-aliases-package: com.board.backend

server:
  port: 8080
