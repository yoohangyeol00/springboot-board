services:
  postgres:
    image: postgres:16
    container_name: board-postgres
    restart: always
    environment:
      POSTGRES_DB: board_db
      POSTGRES_USER: board_user
      POSTGRES_PASSWORD: board_pass
    ports:
      - "5432:5432"
    volumes:
      - board_pg_data:/var/lib/postgresql/data
    networks:
      - board-network

  backend:
    build:
      context: ./backend
    container_name: board-backend
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - ./backend/uploads:/app/uploads
    networks:
      - board-network

  frontend:
    build:
      context: ./frontend
    container_name: board-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - board-network

volumes:
  board_pg_data:

networks:
  board-network: